<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0071e3"/>
      <stop offset="60%" stop-color="#5ab0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="inner" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0071e3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5ab0ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <g transform="translate(100,100)">
    <!-- Flame A: sharp apex, organic flame edges -->
    <!-- Outer flame/A shape -->
    <path d="M0,-82 
             C-4,-70 -8,-58 -14,-42
             Q-22,-22 -32,4
             C-38,20 -44,40 -48,62
             L-32,62
             L-20,26
             L20,26
             L32,62
             L48,62
             C44,40 38,20 32,4
             Q22,-22 14,-42
             C8,-58 4,-70 0,-82Z" 
          fill="url(#flame)"/>
    <!-- Inner cutout (A crossbar + negative space) -->
    <path d="M0,-30 
             C-3,-22 -6,-14 -10,0
             L-14,16 L14,16
             L10,0
             C6,-14 3,-22 0,-30Z" 
          fill="#000"/>
    <!-- Subtle inner glow -->
    <path d="M0,-30 
             C-3,-22 -6,-14 -10,0
             L-14,16 L14,16
             L10,0
             C6,-14 3,-22 0,-30Z" 
          fill="url(#inner)"/>
  </g>
</svg>